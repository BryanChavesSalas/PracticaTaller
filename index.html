<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanFlow — Task Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">KanFlow</span>
      </div>
      <div class="header-actions">
        <button class="btn-new-task" id="btnNewTask">+ Nueva tarea</button>
        <button class="btn-clear" id="btnClear">Limpiar tablero</button>
      </div>
    </div>
  </header>

  <!-- KANBAN BOARD -->
  <main class="board">

    <!-- Columna Pendiente -->
    <div class="column" data-column="pendiente">
      <div class="column-header">
        <span class="column-dot dot-pending"></span>
        <h2 class="column-title">Pendiente</h2>
        <span class="column-count" id="count-pendiente">0</span>
      </div>
      <div class="task-list" id="list-pendiente"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event, 'pendiente')">
      </div>
    </div>

    <!-- Columna En progreso -->
    <div class="column" data-column="progreso">
      <div class="column-header">
        <span class="column-dot dot-progress"></span>
        <h2 class="column-title">En progreso</h2>
        <span class="column-count" id="count-progreso">0</span>
      </div>
      <div class="task-list" id="list-progreso"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event, 'progreso')">
      </div>
    </div>

    <!-- Columna Hecho -->
    <div class="column" data-column="hecho">
      <div class="column-header">
        <span class="column-dot dot-done"></span>
        <h2 class="column-title">Hecho</h2>
        <span class="column-count" id="count-hecho">0</span>
      </div>
      <div class="task-list" id="list-hecho"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event, 'hecho')">
      </div>
    </div>

  </main>

  <!-- MODAL: NUEVA TAREA -->
  <div class="modal-overlay" id="modalNew">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Nueva tarea</h3>
        <button class="modal-close" id="closeModalNew">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Título</label>
        <input class="field-input" id="newTitle" type="text" placeholder="Ej: Diseñar la interfaz..." maxlength="80" />
        <label class="field-label">Descripción</label>
        <textarea class="field-textarea" id="newDesc" placeholder="Describe brevemente la tarea..." rows="4" maxlength="300"></textarea>
        <label class="field-label">Columna inicial</label>
        <select class="field-select" id="newColumn">
          <option value="pendiente">Pendiente</option>
          <option value="progreso">En progreso</option>
          <option value="hecho">Hecho</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelNew">Cancelar</button>
        <button class="btn-primary" id="saveNew">Crear tarea</button>
      </div>
    </div>
  </div>

  <!-- MODAL: EDITAR TAREA -->
  <div class="modal-overlay" id="modalEdit">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Detalle de tarea</h3>
        <button class="modal-close" id="closeModalEdit">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Título</label>
        <input class="field-input" id="editTitle" type="text" maxlength="80" />
        <label class="field-label">Descripción</label>
        <textarea class="field-textarea" id="editDesc" rows="4" maxlength="300"></textarea>
        <label class="field-label">Columna</label>
        <select class="field-select" id="editColumn">
          <option value="pendiente">Pendiente</option>
          <option value="progreso">En progreso</option>
          <option value="hecho">Hecho</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" id="deleteTask">Eliminar</button>
        <div class="footer-right">
          <button class="btn-secondary" id="cancelEdit">Cancelar</button>
          <button class="btn-primary" id="saveEdit">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CONFIRMACIÓN LIMPIAR TABLERO -->
  <div class="modal-overlay" id="modalConfirm">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 class="modal-title">¿Limpiar tablero?</h3>
        <button class="modal-close" id="closeModalConfirm">&times;</button>
      </div>
      <div class="modal-body">
        <p class="confirm-text">Esta acción eliminará <strong>todas</strong> las tareas del tablero. No se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelConfirm">Cancelar</button>
        <button class="btn-danger" id="confirmClear">Sí, limpiar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
